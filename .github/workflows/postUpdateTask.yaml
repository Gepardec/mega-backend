name: PostUpgradeTask

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'feature/base-auto-update'

jobs:
  verifyupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test project with Maven
        run: mvn -B package --file pom.xml

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}

  postupgradetask:
    name: Create Quarkus autoupdate PR
    if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/quarkus_') }}
    runs-on: ubuntu-latest

    steps:
      - name: Echo refs
        run: |
          echo "head_ref=${{ github.head_ref }}"
          echo "base_ref=${{ github.base_ref }}"

      - name: Parse Renovate branch name
        id: parse
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          SUFFIX="${BRANCH#renovate/}"
          DEPNAME="$(echo "$SUFFIX" | cut -d'_' -f1)"
          CURR_VERSION="$(echo "$SUFFIX" | cut -d'_' -f2)"
          NEW_VERSION="$(echo "$SUFFIX" | cut -d'_' -f3)"

          echo "SUFFIX=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "DEPNAME=$DEPNAME" >> "$GITHUB_OUTPUT"
          echo "CURR_VERSION=$CURR_VERSION" >> "$GITHUB_OUTPUT"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Echo parsed values
        run: |
          echo "depname=${{ steps.parse.outputs.DEPNAME }}"
          echo "currVersion=${{ steps.parse.outputs.CURR_VERSION }}"
          echo "newVersion=${{ steps.parse.outputs.NEW_VERSION }}"
          echo "suffix=${{ steps.parse.outputs.SUFFIX }}"

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: feature/base-auto-update
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run Quarkus update
        env:
          NEW_VERSION: ${{ steps.parse.outputs.NEW_VERSION }}
        run: |
          java --version
          mvn --version
          yes | mvn io.quarkus.platform:quarkus-maven-plugin:${NEW_VERSION}:update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          commit-message: "chore: autoupdate quarkus to ${{ steps.parse.outputs.NEW_VERSION }}"
          title: "Autoupdate Quarkus ${{ steps.parse.outputs.CURR_VERSION }} -> ${{ steps.parse.outputs.NEW_VERSION }}"
          branch: autoupdate/${{ steps.parse.outputs.SUFFIX }}
          base: feature/base-auto-update
          delete-branch: true
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          body: |
            This PR was created automatically from Renovate PR `${{ github.head_ref }}`.

            Dependency: `${{ steps.parse.outputs.DEPNAME }}`
            Current version: `${{ steps.parse.outputs.CURR_VERSION }}`
            New version: `${{ steps.parse.outputs.NEW_VERSION }}`

            It applies the Quarkus update directly on top of `feature/base-auto-update`.