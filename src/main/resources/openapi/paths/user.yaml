'/users/me':
  get:
    tags:
      - User
    operationId: getCurrentUser
    summary: Get the authenticated employee profile
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Authenticated employee profile
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/User'
      '403':
        $ref: '../responses/common.yaml#/Forbidden'
      '500':
        $ref: '../responses/common.yaml#/InternalServerError'
'/users/active':
  get:
    tags:
      - User
    operationId: getActiveUsers
    summary: List employees active in the previous payroll month
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Active employees from the previous payroll month
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/user.yaml#/ActiveUser'
      '403':
        $ref: '../responses/common.yaml#/Forbidden'
      '500':
        $ref: '../responses/common.yaml#/InternalServerError'
'/users/release-dates':
  put:
    tags:
      - User
    operationId: updateReleaseDates
    summary: Bulk-update user release dates
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UpdateReleaseDatesRequest'
    responses:
      '200':
        description: Bulk release-date update result
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UpdateReleaseDatesResponse'
      '400':
        $ref: '../responses/common.yaml#/BadRequest'
      '403':
        $ref: '../responses/common.yaml#/Forbidden'
      '500':
        $ref: '../responses/common.yaml#/InternalServerError'
