      '403':
        $ref: '../responses/common.yaml#/Forbidden'
      '500':
        $ref: '../responses/common.yaml#/InternalServerError'
'/monthend/employee/preparations':
  post:
    tags:
      - MonthEndEmployee
    operationId: prepareEmployeeMonthEndProject
    summary: Prepare the authenticated employee's month-end project context
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/monthend.yaml#/PrepareMonthEndProjectRequest'
    responses:
      '200':
        description: Prepared month-end project context
        content:
          application/json:
            schema:
