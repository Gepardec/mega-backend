'/monthend/employee/status-overview':
  get:
    tags:
      - MonthEndEmployee
    operationId: getEmployeeMonthEndStatusOverview
    summary: Get the authenticated employee's month-end status overview
    security:
      - bearerAuth: [ ]
    parameters:
      - $ref: '../parameters/common.yaml#/MonthQueryParameter'
    responses:
      '200':
        description: Employee month-end status overview
        content:
          application/json:
            schema:
              $ref: '../schemas/monthend.yaml#/MonthEndStatusOverviewResponse'
      '400':
        $ref: '../responses/common.yaml#/BadRequest'
      '403':
        $ref: '../responses/common.yaml#/Forbidden'
      '500':
        $ref: '../responses/common.yaml#/InternalServerError'
'/monthend/employee/worklist':
  get:
    tags:
      - MonthEndEmployee
    operationId: getEmployeeMonthEndWorklist
    summary: Get the authenticated employee's month-end worklist
