MonthEndTaskType:
  type: string
  enum:
    - EMPLOYEE_TIME_CHECK
    - LEISTUNGSNACHWEIS
    - PROJECT_LEAD_REVIEW
    - ABRECHNUNG
MonthEndTaskStatus:
  type: string
  enum:
    - OPEN
    - DONE
MonthEndClarificationStatus:
  type: string
  enum:
    - OPEN
    - DONE
MonthEndStatusOverviewEntry:
  type: object
  additionalProperties: false
  required:
    - taskId
    - type
    - status
    - project
    - canComplete
  properties:
    taskId:
      type: string
      format: uuid
    type:
      $ref: '#/MonthEndTaskType'
    status:
      $ref: '#/MonthEndTaskStatus'
    project:
      $ref: './shared.yaml#/ProjectRef'
    canComplete:
      type: boolean
    subjectEmployee:
      $ref: './shared.yaml#/UserRef'
      nullable: true
    completedBy:
      type: string
      format: uuid
      nullable: true
MonthEndOverviewClarificationEntry:
  type: object
  additionalProperties: false
  required:
    - clarificationId
    - projectId
    - createdBy
    - status
    - text
    - canResolve
    - canEditText
    - canDelete
    - createdAt
    - lastModifiedAt
  properties:
    clarificationId:
      type: string
      format: uuid
    projectId:
      type: string
      format: uuid
    subjectEmployee:
      $ref: './shared.yaml#/UserRef'
      nullable: true
    createdBy:
      $ref: './shared.yaml#/UserRef'
    status:
      $ref: '#/MonthEndClarificationStatus'
    text:
      type: string
    canResolve:
      type: boolean
    canEditText:
      type: boolean
    canDelete:
      type: boolean
    resolutionNote:
      type: string
      nullable: true
    resolvedBy:
      $ref: './shared.yaml#/UserRef'
      nullable: true
    resolvedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time
    lastModifiedAt:
      type: string
      format: date-time
MonthEndStatusOverview:
  type: object
  additionalProperties: false
  required:
    - month
    - tasks
    - clarifications
  properties:
    month:
      $ref: './shared.yaml#/MonthValue'
    tasks:
      type: array
      items:
        $ref: '#/MonthEndStatusOverviewEntry'
    clarifications:
      type: array
      items:
        $ref: '#/MonthEndOverviewClarificationEntry'
GenerateMonthEndPrematurelyRequest:
  type: object
  additionalProperties: false
  required:
    - month
    - clarificationText
  properties:
    month:
      $ref: './shared.yaml#/MonthValue'
    clarificationText:
      type: string
      x-field-extra-annotation: '@jakarta.validation.constraints.NotBlank'
CreateClarificationRequest:
  type: object
  additionalProperties: false
  required:
    - month
    - projectId
    - text
  properties:
    month:
      $ref: './shared.yaml#/MonthValue'
    projectId:
      type: string
      format: uuid
    subjectEmployeeId:
      type: string
      format: uuid
      nullable: true
    text:
      type: string
UpdateClarificationTextRequest:
  type: object
  additionalProperties: false
  required:
    - text
  properties:
    text:
      type: string
ResolveClarificationRequest:
  type: object
  additionalProperties: false
  properties:
    resolutionNote:
      type: string
      nullable: true
MonthEndTask:
  type: object
  additionalProperties: false
  required:
    - taskId
    - month
    - type
    - projectId
    - status
  properties:
    taskId:
      type: string
      format: uuid
    month:
      $ref: './shared.yaml#/MonthValue'
    type:
      $ref: '#/MonthEndTaskType'
    projectId:
      type: string
      format: uuid
    subjectEmployeeId:
      type: string
      format: uuid
      nullable: true
    status:
      $ref: '#/MonthEndTaskStatus'
    completedBy:
      type: string
      format: uuid
      nullable: true
MonthEndTaskGeneration:
  type: object
  additionalProperties: false
  required:
    - month
    - created
    - skipped
  properties:
    month:
      $ref: './shared.yaml#/MonthValue'
    created:
      type: integer
      format: int32
    skipped:
      type: integer
      format: int32
