MonthValue:
  type: string
  pattern: '^\d{4}-(0[1-9]|1[0-2])$'
  example: '2026-03'
ApiError:
  type: object
  additionalProperties: false
  properties:
    message:
      type: string
      description: Human-readable error message when available.
ProjectRef:
  type: object
  additionalProperties: false
  required:
    - id
    - name
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
UserRef:
  type: object
  additionalProperties: false
  required:
    - id
    - fullName
  properties:
    id:
      type: string
      format: uuid
    fullName:
      type: string