openapi: 3.0.3
info:
  title: Month-End API
  version: 1.0.0
  description: Spec-first REST API for month-end employee, project-lead, shared, and ops flows.
tags:
  - name: MonthEndEmployee
    description: Employee-scoped month-end endpoints
  - name: MonthEndProjectLead
    description: Project-lead-scoped month-end endpoints
  - name: MonthEndShared
    description: Shared actor-scoped month-end endpoints
  - name: MonthEndOps
    description: Internal operational month-end endpoints
paths:
  /monthend/employee/worklist:
    get:
      tags:
        - MonthEndEmployee
      operationId: getEmployeeMonthEndWorklist
      summary: Get the authenticated employee's month-end worklist
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MonthQueryParameter'
      responses:
        '200':
          description: Employee month-end worklist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndWorklistResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/employee/preparations:
    post:
      tags:
        - MonthEndEmployee
      operationId: prepareEmployeeMonthEndProject
      summary: Prepare the authenticated employee's month-end project context
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareMonthEndProjectRequest'
      responses:
        '200':
          description: Prepared month-end project context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndPreparationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/employee/clarifications:
    post:
      tags:
        - MonthEndEmployee
      operationId: createEmployeeMonthEndClarification
      summary: Create an employee-side month-end clarification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeClarificationRequest'
      responses:
        '201':
          description: Created clarification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndClarificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/project-lead/worklist:
    get:
      tags:
        - MonthEndProjectLead
      operationId: getProjectLeadMonthEndWorklist
      summary: Get the authenticated project lead's month-end worklist
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MonthQueryParameter'
      responses:
        '200':
          description: Project-lead month-end worklist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndWorklistResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/project-lead/clarifications:
    post:
      tags:
        - MonthEndProjectLead
      operationId: createProjectLeadMonthEndClarification
      summary: Create a project-lead-side month-end clarification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectLeadClarificationRequest'
      responses:
        '201':
          description: Created clarification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndClarificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/status-overview:
    get:
      tags:
        - MonthEndShared
      operationId: getMonthEndStatusOverview
      summary: Get the authenticated actor's month-end status overview
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MonthQueryParameter'
      responses:
        '200':
          description: Actor-centric month-end status overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndStatusOverviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/tasks/{taskId}/complete:
    post:
      tags:
        - MonthEndShared
      operationId: completeMonthEndTask
      summary: Complete a month-end task for the authenticated actor
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskIdPathParameter'
      responses:
        '200':
          description: Completed or unchanged task state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndTaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/clarifications/{clarificationId}/text:
    put:
      tags:
        - MonthEndShared
      operationId: updateMonthEndClarificationText
      summary: Update month-end clarification text for the authenticated actor
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClarificationIdPathParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClarificationTextRequest'
      responses:
        '200':
          description: Updated clarification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndClarificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/clarifications/{clarificationId}/resolve:
    post:
      tags:
        - MonthEndShared
      operationId: resolveMonthEndClarification
      summary: Resolve a month-end clarification for the authenticated actor
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClarificationIdPathParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveClarificationRequest'
      responses:
        '200':
          description: Resolved or unchanged clarification state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndClarificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /monthend/ops/generation:
    post:
      tags:
        - MonthEndOps
      operationId: generateMonthEndTasks
      summary: Generate month-end tasks for a month
      security:
        - mega-cron: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateMonthEndTasksRequest'
      responses:
        '200':
          description: Month-end generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthEndTaskGenerationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: oauth2
      description: Authenticated employee or project-lead token obtained from the connected OIDC server.
      flows:
        authorizationCode:
          authorizationUrl: PLACEHOLDER_AUTHORIZATION_URL
          tokenUrl: PLACEHOLDER_TOKEN_URL
          scopes:
            openid: OpenID Connect scope
            profile: Access to the authenticated user's profile claims
            email: Access to the authenticated user's email claim
            microprofile-jwt: Access token scope used by the application
    mega-cron:
      type: oauth2
      description: Internal operational OAuth2 client-credentials token for month-end generation.
      flows:
        clientCredentials:
          tokenUrl: PLACEHOLDER_TOKEN_URL
          scopes: {}
  parameters:
    MonthQueryParameter:
      name: month
      in: query
      required: true
      description: Month-end context in yyyy-MM format.
      schema:
        $ref: '#/components/schemas/MonthValue'
    TaskIdPathParameter:
      name: taskId
      in: path
      required: true
      description: Month-end task identifier.
      schema:
        type: string
        format: uuid
    ClarificationIdPathParameter:
      name: clarificationId
      in: path
      required: true
      description: Month-end clarification identifier.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Request is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Requested month-end resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Server could not process the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    MonthValue:
      type: string
      pattern: '^\d{4}-(0[1-9]|1[0-2])$'
      example: '2026-03'
    ApiError:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          description: Human-readable error message when available.
    MonthEndTaskType:
      type: string
      enum:
        - EMPLOYEE_TIME_CHECK
        - LEISTUNGSNACHWEIS
        - PROJECT_LEAD_REVIEW
        - ABRECHNUNG
    MonthEndTaskStatus:
      type: string
      enum:
        - OPEN
        - DONE
    MonthEndClarificationStatus:
      type: string
      enum:
        - OPEN
        - DONE
    MonthEndClarificationSide:
      type: string
      enum:
        - EMPLOYEE
        - PROJECT_LEAD
    MonthEndWorklistTask:
      type: object
      additionalProperties: false
      required:
        - taskId
        - type
        - projectId
      properties:
        taskId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/MonthEndTaskType'
        projectId:
          type: string
          format: uuid
        subjectEmployeeId:
          type: string
          format: uuid
          nullable: true
    MonthEndWorklistClarification:
      type: object
      additionalProperties: false
      required:
        - clarificationId
        - projectId
        - subjectEmployeeId
        - createdBy
        - creatorSide
        - status
        - text
        - createdAt
        - lastModifiedAt
      properties:
        clarificationId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        subjectEmployeeId:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        creatorSide:
          $ref: '#/components/schemas/MonthEndClarificationSide'
        status:
          $ref: '#/components/schemas/MonthEndClarificationStatus'
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time
    MonthEndWorklistResponse:
      type: object
      additionalProperties: false
      required:
        - month
        - tasks
        - clarifications
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/MonthEndWorklistTask'
        clarifications:
          type: array
          items:
            $ref: '#/components/schemas/MonthEndWorklistClarification'
    MonthEndStatusOverviewEntry:
      type: object
      additionalProperties: false
      required:
        - taskId
        - type
        - status
        - projectId
      properties:
        taskId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/MonthEndTaskType'
        status:
          $ref: '#/components/schemas/MonthEndTaskStatus'
        projectId:
          type: string
          format: uuid
        subjectEmployeeId:
          type: string
          format: uuid
          nullable: true
        completedBy:
          type: string
          format: uuid
          nullable: true
    MonthEndStatusOverviewResponse:
      type: object
      additionalProperties: false
      required:
        - month
        - entries
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MonthEndStatusOverviewEntry'
    PrepareMonthEndProjectRequest:
      type: object
      additionalProperties: false
      required:
        - month
        - projectId
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
        projectId:
          type: string
          format: uuid
        clarificationText:
          type: string
          nullable: true
    CreateEmployeeClarificationRequest:
      type: object
      additionalProperties: false
      required:
        - month
        - projectId
        - text
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
        projectId:
          type: string
          format: uuid
        text:
          type: string
    CreateProjectLeadClarificationRequest:
      type: object
      additionalProperties: false
      required:
        - month
        - projectId
        - subjectEmployeeId
        - text
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
        projectId:
          type: string
          format: uuid
        subjectEmployeeId:
          type: string
          format: uuid
        text:
          type: string
    UpdateClarificationTextRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
    ResolveClarificationRequest:
      type: object
      additionalProperties: false
      properties:
        resolutionNote:
          type: string
          nullable: true
    GenerateMonthEndTasksRequest:
      type: object
      additionalProperties: false
      required:
        - month
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
    MonthEndTaskResponse:
      type: object
      additionalProperties: false
      required:
        - taskId
        - month
        - type
        - projectId
        - status
      properties:
        taskId:
          type: string
          format: uuid
        month:
          $ref: '#/components/schemas/MonthValue'
        type:
          $ref: '#/components/schemas/MonthEndTaskType'
        projectId:
          type: string
          format: uuid
        subjectEmployeeId:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: '#/components/schemas/MonthEndTaskStatus'
        completedBy:
          type: string
          format: uuid
          nullable: true
    MonthEndClarificationResponse:
      type: object
      additionalProperties: false
      required:
        - clarificationId
        - month
        - projectId
        - subjectEmployeeId
        - createdBy
        - creatorSide
        - status
        - text
        - createdAt
        - lastModifiedAt
      properties:
        clarificationId:
          type: string
          format: uuid
        month:
          $ref: '#/components/schemas/MonthValue'
        projectId:
          type: string
          format: uuid
        subjectEmployeeId:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        creatorSide:
          $ref: '#/components/schemas/MonthEndClarificationSide'
        status:
          $ref: '#/components/schemas/MonthEndClarificationStatus'
        text:
          type: string
        resolutionNote:
          type: string
          nullable: true
        resolvedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        lastModifiedAt:
          type: string
          format: date-time
    MonthEndPreparationResponse:
      type: object
      additionalProperties: false
      required:
        - ensuredTasks
      properties:
        ensuredTasks:
          type: array
          items:
            $ref: '#/components/schemas/MonthEndTaskResponse'
        clarification:
          $ref: '#/components/schemas/MonthEndClarificationResponse'
          nullable: true
    MonthEndTaskGenerationResponse:
      type: object
      additionalProperties: false
      required:
        - month
        - created
        - skipped
      properties:
        month:
          $ref: '#/components/schemas/MonthValue'
        created:
          type: integer
          format: int32
        skipped:
          type: integer
          format: int32
